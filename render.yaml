# Blueprint do Render para o MatchAI.
# Cria: 1 PostgreSQL (com pgvector), 1 serviço de API (Docker) e 1 frontend (Docker).
# Em "Blueprints" do Render, conecte o repo e selecione a branch com este arquivo.

databases:
  - name: matchai-db
    databaseName: matchai
    user: matchai
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: matchai-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: matchai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false          # preencha no painel (sua nova chave Groq)
      - key: CORS_ALLOW_ORIGINS
        sync: false          # ex.: https://matchai-web.onrender.com
      - key: ADMIN_EMAILS
        sync: false          # ex.: seu-email@dominio.com
      - key: SEED_ON_STARTUP
        value: "false"

  - type: web
    name: matchai-web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.web
    dockerContext: .
    envVars:
      - key: MATCHAI_API_BASE_URL
        sync: false          # ex.: https://matchai-api.onrender.com
