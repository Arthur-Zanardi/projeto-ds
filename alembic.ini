# Configuração do Alembic para o MatchAI.
# A URL do banco é injetada em alembic/env.py a partir de src.config.settings.
[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# sqlalchemy.url é definido programaticamente em env.py (não coloque segredo aqui)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
